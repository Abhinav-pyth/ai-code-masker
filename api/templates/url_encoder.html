{% extends "base.html" %}
{% block title %}URL Encoder{% endblock %}

{% block content %}
        <div class="h-14 border-b border-white/5 flex items-center px-8 glass shrink-0">
            <h2 class="text-xs font-black text-white tracking-[4px] uppercase">URL Encoder / Decoder</h2>
        </div>
        <div class="flex-grow grid grid-cols-1 lg:grid-cols-2 p-8 gap-6 overflow-hidden">
            <div class="flex flex-col space-y-4 overflow-hidden">
                <div class="flex justify-between items-center text-[10px] font-black text-indigo-400 tracking-[3px] uppercase">
                    <span>Input</span>
                    <label class="flex items-center gap-2 text-slate-400 font-normal normal-case tracking-normal">
                        <input type="checkbox" id="full-uri" class="accent-indigo-500"> <span class="text-[10px]">Full URI mode</span>
                    </label>
                </div>
                <textarea id="url-input"
                    class="flex-grow glass-card rounded-2xl p-6 bg-transparent code-font text-sm text-slate-100 placeholder-slate-700 outline-none resize-none"
                    placeholder="Enter text or URL to encode/decode..."></textarea>
                <div class="flex gap-3">
                    <button onclick="doEncode()"
                        class="flex-1 btn-premium py-3 rounded-xl text-[10px] font-black uppercase tracking-[3px]">Encode</button>
                    <button onclick="doDecode()"
                        class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-[3px] border border-indigo-500/30 text-indigo-400 hover:bg-indigo-600/10 transition-all">Decode</button>
                </div>
            </div>
            <div class="flex flex-col space-y-4 overflow-hidden">
                <div class="flex justify-between items-center text-[10px] font-black text-slate-500 tracking-[3px] uppercase">
                    <span>Output</span>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('url-output').value);showToast('Copied!')"
                        class="text-indigo-400 hover:text-white transition-all">Copy</button>
                </div>
                <textarea id="url-output" readonly
                    class="flex-grow glass-card rounded-2xl p-6 bg-slate-950/40 code-font text-sm text-indigo-300/80 outline-none resize-none"></textarea>
            </div>
        </div>
{% endblock %}

{% block scripts %}
    <script>
        function doEncode() {
            const input = document.getElementById('url-input').value;
            const full = document.getElementById('full-uri').checked;
            document.getElementById('url-output').value = full ? encodeURI(input) : encodeURIComponent(input);
        }
        function doDecode() {
            const input = document.getElementById('url-input').value;
            const full = document.getElementById('full-uri').checked;
            try {
                document.getElementById('url-output').value = full ? decodeURI(input) : decodeURIComponent(input);
            } catch(e) {
                document.getElementById('url-output').value = 'Error: ' + e.message;
            }
        }
        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.className = 'fixed bottom-6 right-6 code-font text-sm bg-indigo-600/80 backdrop-blur-md text-white px-5 py-3 rounded-xl shadow-lg border border-indigo-500/30 z-50';
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.4s'; setTimeout(() => t.remove(), 400); }, 1500);
        }
    </script>
{% endblock %}
