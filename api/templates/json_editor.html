<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor - Advanced Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .code-font {
            font-family: 'Fira Code', monospace;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-bg {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
        }

        .tree-node {
            position: relative;
            padding-left: 1.5rem;
            margin-top: 0.25rem;
            transition: all 0.2s ease;
        }

        .tree-toggle {
            cursor: pointer;
            position: absolute;
            left: 0;
            top: 0;
            transition: transform 0.2s ease;
        }

        .tree-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .tree-children.hidden {
            display: none;
        }

        .tree-key {
            color: #818cf8;
            font-weight: 500;
        }

        .tree-value-string {
            color: #34d399;
        }

        .tree-value-number {
            color: #fbbf24;
        }

        .tree-value-boolean {
            color: #f472b6;
        }

        .tree-value-null {
            color: #94a3b8;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="gradient-bg text-slate-200 h-screen w-screen flex flex-row overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside
        class="w-20 lg:w-64 glass border-r border-white/5 flex flex-col items-center lg:items-stretch py-8 space-y-10 z-50">
        <div class="flex items-center px-6 space-x-3 group cursor-pointer" onclick="window.location.href='/'">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <div class="hidden lg:block">
                <h1 class="text-sm font-bold text-white tracking-widest uppercase">Code Masker</h1>
                <p class="text-[9px] text-indigo-400 font-bold uppercase opacity-80">Workspace v2.1</p>
            </div>
        </div>

        <nav class="flex-grow flex flex-col space-y-2 px-3">
            <a href="/"
                class="flex items-center space-x-3 text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 rounded-2xl transition-all">
                <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                    </path>
                </svg>
                <span class="hidden lg:block text-sm font-medium italic">Masker</span>
            </a>
            <a href="/json-editor"
                class="flex items-center space-x-3 bg-white/5 text-white px-4 py-3 rounded-2xl border border-indigo-500/30 transition-all">
                <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                <span class="hidden lg:block text-sm font-semibold italic">JSON Editor</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col h-full overflow-hidden">
        <!-- Top Toolbar -->
        <div class="h-16 border-b border-white/5 flex items-center justify-between px-10 glass">
            <div class="flex items-center space-x-4">
                <h2 class="text-xs font-black text-white tracking-[4px] uppercase">JSON Core Utility</h2>
            </div>
            <div class="flex space-x-3">
                <button onclick="copyEditor()"
                    class="text-[10px] font-bold text-slate-500 hover:text-indigo-400 tracking-widest uppercase transition-all">Copy
                    RAW</button>
                <button onclick="prettify()"
                    class="px-4 py-1.5 glass rounded-lg text-[10px] font-bold text-indigo-400 hover:bg-white/5 transition-all uppercase">Prettify</button>
                <button onclick="minify()"
                    class="px-4 py-1.5 glass rounded-lg text-[10px] font-bold text-slate-400 hover:bg-white/5 transition-all uppercase">Minify</button>
                <button onclick="clearAll()"
                    class="px-4 py-1.5 bg-red-500/10 rounded-lg text-[10px] font-bold text-red-400 hover:bg-red-500/20 transition-all uppercase">Clear</button>
            </div>
        </div>

        <div class="flex-grow grid grid-cols-1 lg:grid-cols-2 p-8 gap-8 overflow-hidden items-stretch bg-black/10">
            <!-- Left Pane (Editor) -->
            <div class="flex flex-col space-y-4">
                <div
                    class="flex justify-between items-center text-[10px] font-black text-indigo-400 tracking-[3px] uppercase">
                    <span>Source JSON</span>
                </div>
                <div class="flex-grow glass-card rounded-3xl p-8 relative flex flex-col">
                    <textarea id="json-input"
                        class="flex-grow bg-transparent code-font text-sm leading-relaxed text-slate-100 placeholder-slate-800 outline-none resize-none"
                        placeholder='{"your": "json data..."}' oninput="refreshTree()"></textarea>
                </div>
            </div>

            <!-- Right Pane (Tree View) -->
            <div class="flex flex-col space-y-4 overflow-hidden">
                <div
                    class="flex justify-between items-center text-[10px] font-black text-slate-500 tracking-[3px] uppercase">
                    <span>Structural Tree</span>
                    <span id="status-badge" class="text-emerald-500/80 italic lowercase tracking-normal">synced</span>
                </div>
                <div id="tree-container"
                    class="flex-grow glass-card rounded-3xl p-8 overflow-auto code-font text-sm leading-relaxed">
                    <div class="text-slate-600 italic">No structure to display yet...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', () => {
            gsap.from("aside", { x: -100, opacity: 0, duration: 0.8, ease: "power4.out" });
            gsap.from(".glass", { y: -50, opacity: 0, duration: 0.8, ease: "power4.out" });
            gsap.from(".glass-card", { scale: 0.98, opacity: 0, duration: 1, delay: 0.3, stagger: 0.1, ease: "expo.out" });
        });

        const input = document.getElementById('json-input');
        const tree = document.getElementById('tree-container');
        const badge = document.getElementById('status-badge');

        function refreshTree() {
            const raw = input.value.trim();
            if (!raw) {
                tree.innerHTML = '<div class="text-slate-600 italic">No structure to display yet...</div>';
                badge.innerText = 'empty';
                badge.className = 'text-slate-600 italic';
                return;
            }

            try {
                const parsed = JSON.parse(raw);
                tree.innerHTML = '';
                render(parsed, tree, 'Root');
                badge.innerText = 'structurally sound';
                badge.className = 'text-emerald-500/80 italic';
            } catch (e) {
                badge.innerText = 'syntax error';
                badge.className = 'text-red-500/80 italic';
            }
        }

        function render(data, container, key) {
            const node = document.createElement('div');
            node.className = 'tree-node';

            const isCollapsible = typeof data === 'object' && data !== null;

            if (isCollapsible) {
                const toggle = document.createElement('span');
                toggle.className = 'tree-toggle text-indigo-500 font-black mr-2 select-none';
                toggle.innerHTML = '▾';
                toggle.onclick = (e) => {
                    const children = node.querySelector('.tree-children');
                    const isHidden = children.classList.toggle('hidden');
                    toggle.innerHTML = isHidden ? '▸' : '▾';
                    toggle.classList.toggle('collapsed', isHidden);
                    e.stopPropagation();
                };
                node.appendChild(toggle);
            }

            const header = document.createElement('span');
            header.innerHTML = `<span class="tree-key">${key}</span>: `;
            node.appendChild(header);

            if (isCollapsible) {
                header.innerHTML += Array.isArray(data) ? '<span class="text-slate-600">[</span>' : '<span class="text-slate-600">{</span>';

                const children = document.createElement('div');
                children.className = 'tree-children ml-4 border-l border-white/5 pl-4';

                Object.keys(data).forEach(k => {
                    render(data[k], children, k);
                });

                node.appendChild(children);
                const footer = document.createElement('div');
                footer.innerHTML = Array.isArray(data) ? '<span class="text-slate-600">]</span>' : '<span class="text-slate-600">}</span>';
                node.appendChild(footer);
            } else {
                let valSpan = document.createElement('span');
                if (typeof data === 'string') {
                    valSpan.className = 'tree-value-string';
                    valSpan.innerText = `"${data}"`;
                } else if (typeof data === 'number') {
                    valSpan.className = 'tree-value-number';
                    valSpan.innerText = data;
                } else if (typeof data === 'boolean') {
                    valSpan.className = 'tree-value-boolean';
                    valSpan.innerText = data;
                } else {
                    valSpan.className = 'tree-value-null';
                    valSpan.innerText = 'null';
                }
                node.appendChild(valSpan);
            }

            container.appendChild(node);
        }

        function prettify() {
            try {
                input.value = JSON.stringify(JSON.parse(input.value), null, 4);
                refreshTree();
            } catch (e) { }
        }

        function minify() {
            try {
                input.value = JSON.stringify(JSON.parse(input.value));
                refreshTree();
            } catch (e) { }
        }

        function clearAll() {
            input.value = '';
            refreshTree();
        }

        function copyEditor() {
            navigator.clipboard.writeText(input.value);
            alert("JSON Copied");
        }
    </script>
</body>

</html>
