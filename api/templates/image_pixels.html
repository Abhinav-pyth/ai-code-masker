{% extends "base.html" %}

{% block title %}Pixel Editor{% endblock %}

{% block content %}
<style>
  .glass-card {
    background: rgba(30, 27, 75, 0.4);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(129, 140, 248, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .toolbar {
    background: rgba(30, 27, 75, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(129, 140, 248, 0.25);
    border-radius: 12px;
    padding: 14px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toolbar-title {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #a5b4fc;
    text-transform: uppercase;
  }

  .code-font {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    min-height: 100vh;
    color: #e2e8f0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  input[type="file"] {
    width: 100%;
    padding: 10px 14px;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid rgba(129, 140, 248, 0.2);
    border-radius: 8px;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    cursor: pointer;
  }

  input[type="file"]::file-selector-button {
    background: rgba(99, 102, 241, 0.3);
    border: 1px solid rgba(129, 140, 248, 0.3);
    border-radius: 6px;
    color: #a5b4fc;
    padding: 6px 14px;
    margin-right: 12px;
    cursor: pointer;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
  }

  input[type="color"] {
    width: 48px;
    height: 36px;
    border: 1px solid rgba(129, 140, 248, 0.3);
    border-radius: 6px;
    background: rgba(15, 23, 42, 0.6);
    cursor: pointer;
    padding: 2px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    background: rgba(99, 102, 241, 0.3);
    border: 1px solid rgba(129, 140, 248, 0.3);
    border-radius: 8px;
    color: #c7d2fe;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: rgba(99, 102, 241, 0.5);
    border-color: rgba(129, 140, 248, 0.5);
    color: #ffffff;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 14px;
    min-width: 36px;
  }

  .btn.active {
    background: rgba(99, 102, 241, 0.6);
    border-color: rgba(129, 140, 248, 0.6);
    color: #ffffff;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    margin-bottom: 0;
    white-space: nowrap;
  }

  .zoom-display {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    color: #a5b4fc;
    min-width: 50px;
    text-align: center;
  }

  .brush-sizes {
    display: flex;
    gap: 6px;
  }

  .canvas-wrapper {
    overflow: auto;
    max-height: 600px;
    border: 1px solid rgba(129, 140, 248, 0.2);
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.3);
    margin-top: 16px;
    cursor: crosshair;
  }

  .canvas-wrapper canvas {
    display: block;
    image-rendering: pixelated;
  }

  .info-text {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
  }

  .actions-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
</style>

<div class="container">
  <div class="toolbar">
    <span class="toolbar-title">Pixel Editor</span>
    <span class="code-font" style="font-size: 12px; color: #64748b;" id="cursorInfo"></span>
  </div>

  <div class="glass-card">
    <label>Load Image</label>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="glass-card" id="editorCard" style="display: none;">
    <div class="controls-row">
      <div class="control-group">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#ffffff">
      </div>

      <div class="control-group">
        <label>Brush</label>
        <div class="brush-sizes">
          <button class="btn btn-sm active" data-size="1" onclick="setBrush(1, this)">1px</button>
          <button class="btn btn-sm" data-size="2" onclick="setBrush(2, this)">2px</button>
          <button class="btn btn-sm" data-size="4" onclick="setBrush(4, this)">4px</button>
          <button class="btn btn-sm" data-size="8" onclick="setBrush(8, this)">8px</button>
        </div>
      </div>

      <div class="control-group">
        <label>Zoom</label>
        <button class="btn btn-sm" onclick="changeZoom(-1)">-</button>
        <span class="zoom-display" id="zoomDisplay">1x</span>
        <button class="btn btn-sm" onclick="changeZoom(1)">+</button>
      </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="canvas"></canvas>
    </div>

    <div class="actions-row">
      <button class="btn" onclick="downloadImage()">Download</button>
      <button class="btn" onclick="clearCanvas()">Clear</button>
    </div>

    <p class="info-text" id="imageInfo"></p>
  </div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const colorPicker = document.getElementById('colorPicker');
  const editorCard = document.getElementById('editorCard');
  const zoomDisplay = document.getElementById('zoomDisplay');
  const cursorInfo = document.getElementById('cursorInfo');
  const imageInfo = document.getElementById('imageInfo');

  let isDrawing = false;
  let brushSize = 1;
  let zoomLevel = 1;
  const zoomLevels = [1, 2, 4, 8, 16];
  let zoomIndex = 0;
  let imageData = null;
  let originalWidth = 0;
  let originalHeight = 0;

  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = new Image();
      img.onload = function() {
        originalWidth = img.width;
        originalHeight = img.height;
        canvas.width = originalWidth;
        canvas.height = originalHeight;
        ctx.drawImage(img, 0, 0);
        imageData = ctx.getImageData(0, 0, originalWidth, originalHeight);

        zoomIndex = 0;
        zoomLevel = 1;
        applyZoom();

        editorCard.style.display = 'block';
        imageInfo.textContent = originalWidth + ' x ' + originalHeight + ' px';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  function applyZoom() {
    zoomLevel = zoomLevels[zoomIndex];
    zoomDisplay.textContent = zoomLevel + 'x';
    canvas.style.width = (originalWidth * zoomLevel) + 'px';
    canvas.style.height = (originalHeight * zoomLevel) + 'px';
  }

  function changeZoom(dir) {
    const newIndex = zoomIndex + dir;
    if (newIndex >= 0 && newIndex < zoomLevels.length) {
      zoomIndex = newIndex;
      applyZoom();
    }
  }

  function setBrush(size, btnEl) {
    brushSize = size;
    document.querySelectorAll('.brush-sizes .btn').forEach(function(b) {
      b.classList.remove('active');
    });
    btnEl.classList.add('active');
  }

  function getCanvasCoords(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: Math.floor((e.clientX - rect.left) * scaleX),
      y: Math.floor((e.clientY - rect.top) * scaleY)
    };
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r: r, g: g, b: b };
  }

  function drawPixel(x, y) {
    const color = hexToRgb(colorPicker.value);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const half = Math.floor(brushSize / 2);

    for (let dy = -half; dy < brushSize - half; dy++) {
      for (let dx = -half; dx < brushSize - half; dx++) {
        const px = x + dx;
        const py = y + dy;
        if (px >= 0 && px < canvas.width && py >= 0 && py < canvas.height) {
          const idx = (py * canvas.width + px) * 4;
          imgData.data[idx] = color.r;
          imgData.data[idx + 1] = color.g;
          imgData.data[idx + 2] = color.b;
          imgData.data[idx + 3] = 255;
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);
  }

  canvas.addEventListener('mousedown', function(e) {
    isDrawing = true;
    const coords = getCanvasCoords(e);
    drawPixel(coords.x, coords.y);
  });

  canvas.addEventListener('mousemove', function(e) {
    const coords = getCanvasCoords(e);
    cursorInfo.textContent = 'x: ' + coords.x + '  y: ' + coords.y;

    if (isDrawing) {
      drawPixel(coords.x, coords.y);
    }
  });

  canvas.addEventListener('mouseup', function() {
    isDrawing = false;
  });

  canvas.addEventListener('mouseleave', function() {
    isDrawing = false;
  });

  function clearCanvas() {
    if (imageData) {
      ctx.putImageData(imageData, 0, 0);
    }
  }

  function downloadImage() {
    const dataURL = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = 'edited_image.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>
{% endblock %}
