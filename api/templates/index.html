<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Masker - Security Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .code-font {
            font-family: 'Fira Code', monospace;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-bg {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #000000);
        }

        .btn-premium {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px #6366f1;
        }

        .tab-btn.active {
            color: white;
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="gradient-bg text-slate-200 h-screen w-screen flex flex-row overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside
        class="w-20 lg:w-64 glass border-r border-white/5 flex flex-col items-center lg:items-stretch py-8 space-y-10 z-50">
        <div class="flex items-center px-6 space-x-3 group cursor-pointer" onclick="window.location.reload()">
            <div
                class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <div class="hidden lg:block">
                <h1 class="text-sm font-bold text-white tracking-widest uppercase">Code Masker</h1>
                <p class="text-[9px] text-indigo-400 font-bold uppercase opacity-80">Workspace v2.1</p>
            </div>
        </div>

        <nav class="flex-grow flex flex-col space-y-2 px-3">
            <a href="/"
                class="flex items-center space-x-3 bg-white/5 text-white px-4 py-3 rounded-2xl border border-indigo-500/30 transition-all">
                <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                    </path>
                </svg>
                <span class="hidden lg:block text-sm font-semibold italic">Masker</span>
            </a>
            <a href="/json-editor"
                class="flex items-center space-x-3 text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 rounded-2xl transition-all">
                <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                <span class="hidden lg:block text-sm font-medium italic">JSON Editor</span>
            </a>
        </nav>

        <div class="px-6 space-y-4">
            <div class="hidden lg:block p-4 glass-card rounded-2xl">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Local Status</p>
                <div class="flex items-center space-x-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="text-xs text-emerald-400 font-medium tracking-tight">Active Engine</span>
                </div>
            </div>
            <button
                class="w-full btn-premium py-3 rounded-xl text-[10px] font-black uppercase tracking-[2px]">Upgrade</button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col h-full bg-black/20">
        <!-- Top Toolbar -->
        <div class="h-16 border-b border-white/5 flex items-center justify-between px-10 glass">
            <div class="flex space-x-1 p-1 bg-white/5 rounded-xl">
                <button id="tab-mask" onclick="switchTab('mask')"
                    class="tab-btn active px-6 py-1.5 rounded-lg text-xs font-bold transition-all border border-transparent">MASK</button>
                <button id="tab-unmask" onclick="switchTab('unmask')"
                    class="tab-btn px-6 py-1.5 rounded-lg text-xs font-bold transition-all border border-transparent text-slate-500 hover:text-slate-300">RESTORE</button>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Language:</span>
                <select id="lang-select"
                    class="bg-indigo-600/10 text-indigo-400 text-[10px] font-black px-3 py-1.5 rounded-lg border border-indigo-500/20 uppercase tracking-widest outline-none cursor-pointer">
                    <option value="java" selected>Java</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                </select>
            </div>
        </div>

        <!-- Editor Area -->
        <div class="flex-grow grid grid-cols-1 lg:grid-cols-2 p-8 gap-8 overflow-hidden items-stretch">
            <!-- Left Pane (Input) -->
            <div id="input-pane" class="flex flex-col space-y-4">
                <div
                    class="flex justify-between items-center text-[10px] font-black text-indigo-400 tracking-[3px] uppercase">
                    <span id="field-label">Original Source</span>
                    <span id="char-count" class="text-slate-600">0 chars</span>
                </div>
                <div class="flex-grow glass-card rounded-3xl p-6 flex flex-col relative group">
                    <textarea id="src-input"
                        class="flex-grow bg-transparent code-font text-sm leading-relaxed text-slate-100 placeholder-slate-700 outline-none resize-none px-2"
                        placeholder="Paste your code..." oninput="updateStats()"></textarea>

                    <div id="map-input-container"
                        class="hidden absolute inset-x-0 bottom-0 p-6 pt-0 animate-in slide-in-from-bottom duration-300">
                        <div
                            class="bg-slate-900/80 backdrop-blur-xl border-t border-white/10 p-5 rounded-t-3xl -mx-6 mb-[-24px]">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[9px] font-black text-indigo-400 tracking-widest uppercase">Restore
                                    Map (JSON)</span>
                            </div>
                            <textarea id="map-input"
                                class="h-[120px] w-full bg-black/40 rounded-xl p-4 code-font text-[11px] text-slate-400 border border-white/5 outline-none focus:border-indigo-500/30 transition-all"
                                placeholder='{"method_1": "actualName", ...}'></textarea>
                        </div>
                    </div>
                </div>
                <button id="action-btn" onclick="execute()"
                    class="btn-premium py-5 rounded-2xl text-[11px] font-black uppercase tracking-[4px] shadow-2xl flex justify-center items-center group relative overflow-hidden">
                    <span id="btn-text">Protect Logic</span>
                    <svg class="w-4 h-4 ml-3 group-hover:translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>

            <!-- Right Pane (Output) -->
            <div id="output-pane" class="flex flex-col space-y-4">
                <div
                    class="flex justify-between items-center text-[10px] font-black text-slate-500 tracking-[3px] uppercase">
                    <span>Result Preview</span>
                    <button onclick="copyResults()"
                        class="text-indigo-400 hover:text-white transition-all underline underline-offset-4">Copy
                        All</button>
                </div>
                <div
                    class="flex-grow bg-slate-950/60 rounded-3xl p-8 overflow-hidden flex flex-col border border-white/5">
                    <div id="result-output"
                        class="flex-grow code-font text-sm text-indigo-300/80 whitespace-pre overflow-auto scroll-smooth">
                        Waiting for operation...</div>
                </div>

                <div id="map-output-container"
                    class="h-1/4 glass-card rounded-3xl p-6 relative overflow-hidden flex flex-col">
                    <div
                        class="flex justify-between items-center mb-3 text-[9px] font-black text-slate-500 tracking-widest uppercase">
                        <span>Restoration Map</span>
                        <button onclick="copyMap()" class="text-indigo-400 hover:text-white italic lowercase">Copy
                            Map</button>
                    </div>
                    <div id="map-output"
                        class="flex-grow text-[10px] code-font text-slate-500 break-all overflow-y-auto italic">
                        Restoration keys appear here.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'mask';

        window.addEventListener('load', () => {
            gsap.from("aside", { x: -100, opacity: 0, duration: 0.8, ease: "power4.out" });
            gsap.from(".glass", { y: -100, opacity: 0, duration: 0.8, ease: "power4.out" });
            gsap.from("#workspace > div", { y: 20, opacity: 0, duration: 1, delay: 0.3, stagger: 0.2, ease: "expo.out" });
        });

        function switchTab(mode) {
            if (mode === currentMode) return;
            currentMode = mode;

            // Clear all text areas
            document.getElementById('src-input').value = '';
            document.getElementById('map-input').value = '';
            document.getElementById('result-output').innerText = 'Waiting for operation...';
            document.getElementById('map-output').innerText = 'Restoration keys appear here.';
            updateStats();

            // UI Toggle
            document.getElementById('tab-mask').classList.toggle('active', mode === 'mask');
            document.getElementById('tab-mask').classList.toggle('text-slate-500', mode !== 'mask');
            document.getElementById('tab-unmask').classList.toggle('active', mode === 'unmask');
            document.getElementById('tab-unmask').classList.toggle('text-slate-500', mode !== 'unmask');

            // Content Toggle
            document.getElementById('field-label').innerText = mode === 'mask' ? 'Original Source' : 'Masked AI Input';
            document.getElementById('btn-text').innerText = mode === 'mask' ? 'Protect Logic' : 'Restore Original';
            document.getElementById('map-input-container').classList.toggle('hidden', mode === 'mask');
            document.getElementById('map-output-container').classList.toggle('hidden', mode === 'unmask');

            // Animation
            gsap.from("#input-pane, #output-pane", { opacity: 0, y: 10, duration: 0.3, stagger: 0.05 });
        }

        function updateStats() {
            const count = document.getElementById('src-input').value.length;
            document.getElementById('char-count').innerText = `${count} chars`;
        }

        async function execute() {
            const code = document.getElementById('src-input').value;
            const lang = document.getElementById('lang-select').value;
            const output = document.getElementById('result-output');
            const mapOutput = document.getElementById('map-output');

            if (!code) return;

            output.innerText = "Processing Logic...";

            try {
                if (currentMode === 'mask') {
                    const res = await fetch('/api/mask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code, lang })
                    });
                    const data = await res.json();
                    if (data.error) throw data.error;
                    output.innerText = data.masked_code;
                    mapOutput.innerText = JSON.stringify(data.mapping);
                } else {
                    const mapVal = document.getElementById('map-input').value;
                    const mapping = JSON.parse(mapVal || '{}');
                    const res = await fetch('/api/unmask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code, mapping, lang })
                    });
                    const data = await res.json();
                    if (data.error) throw data.error;
                    output.innerText = data.unmasked_code;
                }
                gsap.from(output, { opacity: 0, duration: 0.5 });
            } catch (err) {
                output.innerText = "ERROR: " + err;
            }
        }

        function copyResults() {
            navigator.clipboard.writeText(document.getElementById('result-output').innerText);
            alert("Results copied!");
        }

        function copyMap() {
            navigator.clipboard.writeText(document.getElementById('map-output').innerText);
            alert("Map copied!");
        }
    </script>
</body>

</html>
